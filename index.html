<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBX HRM - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>SBX Portal Login</h2>
        <form id="loginForm">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="Enter email" required>
            
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password" required>
            
            <button type="submit">Sign In</button>
        </form>
    </div>

    <script type="module" src="app.js"></script>
    <script type="module">
        import { loginUser } from './app.js';
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            loginUser(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
        });
    </script>
</body>
</html>
